services:
  web:
    build: ./web
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next_dev:/app/.next-dev
    environment:
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
      - WATCHPACK_POLLING_INTERVAL=1000
    depends_on:
      api:
        condition: service_healthy
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - api_vendor:/app/vendor
      - composer_cache:/tmp/composer-cache
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_CONNECTION=${DB_CONNECTION:-pgsql}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_DATABASE=${DB_DATABASE:-storyforge}
      - DB_USERNAME=${DB_USERNAME:-storyforge}
      - DB_PASSWORD=${DB_PASSWORD:-storyforge}
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-mailpit}
      - MAIL_PORT=${MAIL_PORT:-1025}
      - MAIL_SCHEME=${MAIL_SCHEME:-null}
      - MAIL_USERNAME=${MAIL_USERNAME:-null}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-null}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-no-reply@storyforge.local}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-StoryForge}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit((int)!@fsockopen('127.0.0.1',8000));\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=storyforge
      - POSTGRES_USER=storyforge
      - POSTGRES_PASSWORD=storyforge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyforge -d storyforge"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
  web_node_modules:
  web_next_dev:
  api_vendor:
  composer_cache:
